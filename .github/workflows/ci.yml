name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: metadaoproject/setup-anchor@v2
        with:
          anchor-version: 0.30.1
          solana-version: 1.18.0
          node-version: '20'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: anchor build
      - run: anchor test --skip-deploy

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd sdk && npm ci && npx tsc --noEmit && npm test
      - run: cd cli && npm ci && npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: metadaoproject/setup-anchor@v2
        with:
          anchor-version: 0.30.1
          solana-version: 1.18.0
      - run: cd programs && cargo clippy -- -D warnings
