name: CI
on: [push, pull_request]

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk && npm ci && npx tsc --noEmit
      - run: cd sdk && npm test

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk && npm ci
      - run: cd cli && npm ci && npm run build
      - run: node cli/dist/index.js --help

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend/mint-service && npm ci && npm run build
      - run: cd backend/indexer && npm ci && npm run build
      - run: cd backend/compliance-service && npm ci && npm run build

  # anchor:
  #   NOTE: Anchor build + test requires local Rust/Solana toolchain (anchor 0.30.1, solana 1.18.0).
  #   Both programs are already deployed on devnet — see DEVNET_PROOF.md for Program IDs and TX hashes.
  #   To run locally:
  #     anchor build
  #     anchor test --skip-deploy
  #   CI runs SDK + CLI + backend TypeScript checks on every push.
  #   Uncomment below when setup-anchor@v2 supports anchor 0.30.1 on ubuntu-latest:
