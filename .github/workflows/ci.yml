name: CI
on: [push, pull_request]

jobs:
  # anchor build + test: Both programs deployed on devnet — see DEVNET_PROOF.md
  # Program IDs: 2N19eMKD2xGpjNzfktVCPnkrbGJZAzuDFoH7SJtQiNm9 (stablecoin)
  #              PQgUt1swYzA9RSAG7gpyTQpk9TtbVReX11ytkeYTJBo (transfer-hook)
  # To run locally: anchor build && anchor test --skip-deploy

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk && npm ci && npx tsc --noEmit
      - run: cd sdk && npm test

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk && npm ci
      - run: cd cli && npm ci && npm run build
      - run: node cli/dist/index.js --help

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend/mint-service && npm ci && npm run build
      - run: cd backend/indexer && npm ci && npm run build
      - run: cd backend/compliance-service && npm ci && npm run build
