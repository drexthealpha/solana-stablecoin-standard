version: '3.8'

services:
  mint-service:
    build: ./mint-service
    ports: ["3001:3001"]
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  indexer:
    build: ./indexer
    ports: ["3002:3002"]
    environment:
      - PORT=3002
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  compliance-service:
    build: ./compliance-service
    ports: ["3003:3003"]
    environment:
      - PORT=3003
      - NODE_ENV=production
      - CHAINALYSIS_API_KEY=${CHAINALYSIS_API_KEY:-}
    volumes:
      - compliance-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  compliance-data:
